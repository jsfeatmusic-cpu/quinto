<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financiero - CPES N°30</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --primary: #F59E0B; /* Naranja para el juego */
            --accent: #3B82F6; /* Azul de contraste */
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --success: #10B981;
            --game-border: #475569;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }
        h1, h2, h3 { color: var(--primary); text-align: center; }
        h4 { color: var(--accent); margin-bottom: 0.5rem; }
        
        .btn-volver {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 0.5rem 1rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            gap: 8px;
        }
        .btn-volver:hover { background-color: var(--primary); color: var(--bg-dark); }

        #profile-screen {
            background-color: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            margin-top: 2rem;
        }
        .player-input {
            padding: 1rem;
            font-size: 1.2rem;
            border: 2px solid var(--text-muted);
            border-radius: 8px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            width: 80%;
            max-width: 300px;
            margin: 1rem 0;
            text-align: center;
        }
        .btn-start {
            background-color: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-start:hover { transform: scale(1.05); }

        #player-header {
            display: none;
            background: linear-gradient(135deg, var(--bg-card), var(--bg-dark));
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 2rem;
            justify-content: space-between;
            align-items: center;
        }
        .player-name-display { font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        .card {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--game-border);
        }

        .simulator {
            background-color: #000000;
            padding: 1.5rem;
            border-radius: 8px;
            border: 2px solid var(--text-muted);
            text-align: center;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }
        .sim-display {
            font-size: 3rem;
            margin: 0.5rem 0;
            color: var(--success);
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .sim-display.negative { color: var(--danger); }
        .sim-display.warning { color: var(--primary); }
        
        .btn-action {
            background-color: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 0.8rem 1.2rem;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }

        @keyframes budgetChange {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: white; }
            100% { transform: scale(1); }
        }
        .animate-budget { animation: budgetChange 0.5s ease; }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .option-box {
            background: var(--bg-dark);
            padding: 1.5rem;
            border-radius: 8px;
            border: 2px solid var(--game-border);
            text-align: left;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .option-box:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        .option-box p { margin: 10px 0; font-size: 1.05rem; }
        .option-cost { font-size: 1.3rem; font-weight: bold; color: var(--success); margin: 10px 0; text-align: center;}
        
        /* Ocultar MathJax al cargar para evitar saltos */
        .math-loading { visibility: hidden; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-volver">🔙 Volver a Inicio</a>

    <h1>Simulador de Supervivencia Financiera</h1>
    
    <div id="profile-screen">
        <h2>Ingresa al Sistema</h2>
        <p>Lee bien cada oferta, haz tus cálculos en papel y elige sabiamente.</p>
        <input type="text" id="player-name" class="player-input" placeholder="Tu nombre..." autocomplete="off">
        <br>
        <button class="btn-start" onclick="startGame()">INICIAR CON $30.000 🚀</button>
    </div>

    <div id="main-app" style="display: none;">
        
        <div id="player-header">
            <div>Jugador: <span class="player-name-display" id="display-name"></span></div>
            <div>Dificultad: <span style="color: var(--danger);">Trampas Matemáticas</span></div>
        </div>

        <div class="simulator">
            <h3 style="color: white; margin-top: 0;">Presupuesto Disponible</h3>
            <div class="sim-display" id="budget-display">$30000</div>
        </div>

        <div id="game-stage" style="margin-top: 2rem;">
            </div>

    </div>
</div>

<script>
    // Iniciar Juego
    function startGame() {
        const nameInput = document.getElementById('player-name').value.trim();
        if (nameInput === "") {
            alert("Ingresa tu nombre para jugar.");
            return;
        }
        
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('player-header').style.display = 'flex';
        document.getElementById('display-name').innerText = nameInput;
        
        loadScenario(0);
    }

    let budget = 30000;
    let currentScenario = 0;

    // BANCO DE ESCENARIOS
    const scenarios = [
        {
            title: "🍟 Parada en 'McBurger': Calculando Combos",
            description: "Tienes hambre y vas con un amigo. Lee bien las cantidades y elige la opción que rinda más usando suma y división de fracciones.",
            options: [
                { 
                    desc: "Combo 'Doble Cuarto': Trae \\( \\frac{1}{4} + \\frac{1}{4} \\) lb de carne + Gaseosa de \\( \\frac{1}{2} \\) Litro. Pagas todo tú.", 
                    cost: 8500 
                },
                { 
                    desc: "Combo 'Mega Mitad': Trae \\( \\frac{1}{2} \\) lb de carne + Gaseosa gigante de \\( \\frac{3}{2} \\) Litros. Cuesta $12.000, pero la pagas a medias con tu amigo (Divides por 2).", 
                    cost: 6000 
                },
                { 
                    desc: "Comprar 3 hamburguesitas simples de \\( \\frac{1}{8} \\) lb a $3000 cada una.", 
                    cost: 9000 
                }
            ]
        },
        {
            title: "🥤 El Supermercado: La trampa de los líquidos",
            description: "Tu mamá te pide que compres **exactamente 3 Litros** de gaseosa para la cena. ¿Qué combinación es la más económica?",
            options: [
                { 
                    desc: "Comprar botellitas de \\( \\frac{1}{2} \\) Litro. Cuestan $1500 cada una. (Calcula cuántas necesitas para llegar a 3L).", 
                    cost: 9000 // 6 botellas * 1500
                },
                { 
                    desc: "Comprar botellas familiares de \\( \\frac{3}{2} \\) Litros (1.5L). Cuestan $3800 cada una. (Calcula cuántas necesitas).", 
                    cost: 7600 // 2 botellas * 3800
                },
                { 
                    desc: "Comprar una botella gigante de 3 Litros. Precio directo de góndola: $8500.", 
                    cost: 8500 
                }
            ]
        },
        {
            title: "🏍️ Repuestos de Moto: Aceite y Espejos",
            description: "Tienes que hacerle el service a la moto. Necesitas **2 Litros de aceite** y un espejo nuevo.",
            options: [
                { 
                    desc: "Opción A: Comprar botellas sueltas de \\( \\frac{1}{2} \\) Litro a $2000 cada una + el espejo a $5000.", 
                    cost: 13000 // 4 * 2000 + 5000
                },
                { 
                    desc: "Opción B: Bidón de \\( \\frac{5}{2} \\) Litros a $9000 (te sobra aceite) + un espejo de $8000 que tiene un descuento de \\( \\frac{1}{4} \\) de su precio.", 
                    cost: 15000 // 9000 + (8000 - 2000)
                },
                { 
                    desc: "Opción C: Tres botellas de \\( \\frac{3}{4} \\) Litro a $3000 c/u + Espejo a $5000. (Ojo: verifica si llegas a los 2 litros).", 
                    cost: 14000 // 3 * 3000 + 5000. (3/4 * 3 = 9/4 = 2.25L. Sí llega)
                }
            ]
        },
        {
            title: "🎁 Regalos para amigos",
            description: "Es el día del amigo y quieres comprar chocolates para **4 amigos**. El kilo (1 kg) de chocolate artesanal cuesta $16.000.",
            options: [
                { 
                    desc: "Comprar cajas individuales de \\( \\frac{1}{8} \\) de kilo a $2500 cada una. Necesitas 4.", 
                    cost: 10000 // 4 * 2500
                },
                { 
                    desc: "Comprar un bloque entero de \\( \\frac{3}{4} \\) de kilo para que lo compartan. Pagas la parte proporcional del kilo.", 
                    cost: 12000 // (16000 / 4) * 3
                },
                { 
                    desc: "No comprar nada y hacerles una carta a mano (¡El valor de la amistad!).", 
                    cost: 0 
                }
            ]
        }
    ];

    function updateBudgetDisplay() {
        const display = document.getElementById('budget-display');
        display.innerText = `$${budget}`;
        
        display.classList.remove('negative', 'warning');
        if (budget < 0) {
            display.classList.add('negative');
        } else if (budget < 5000) {
            display.classList.add('warning');
        }
        
        // Disparar animación
        display.classList.remove('animate-budget');
        void display.offsetWidth; // Trigger reflow
        display.classList.add('animate-budget');
    }

    function loadScenario(index) {
        if (budget < 0) {
            endGame(false);
            return;
        }
        if (index >= scenarios.length) {
            endGame(true);
            return;
        }

        currentScenario = index;
        const scenario = scenarios[index];
        const stage = document.getElementById('game-stage');

        let optionsHtml = `<div class="card">
            <h2 style="color: var(--primary);">${scenario.title}</h2>
            <p style="font-size: 1.1rem; margin-bottom: 20px;">${scenario.description}</p>
            <div class="options-grid">`;

        scenario.options.forEach((opt, optIndex) => {
            optionsHtml += `
            <div class="option-box">
                <p>${opt.desc}</p>
                <button class="btn-action" onclick="confirmChoice(${optIndex})">Seleccionar esta opción</button>
            </div>`;
        });

        optionsHtml += `</div></div>`;
        stage.innerHTML = optionsHtml;
        
        // Renderizar ecuaciones matemáticas
        MathJax.typesetPromise();
    }

    function confirmChoice(optIndex) {
        const cost = scenarios[currentScenario].options[optIndex].cost;
        
        // Ventana de confirmación para que vean el precio que acaban de pagar
        if(confirm(`Has calculado que esta opción cuesta $${cost}. ¿Estás seguro de tu decisión matemática?`)) {
            budget -= cost;
            updateBudgetDisplay();
            
            // Scroll hacia arriba para ver el presupuesto bajar
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            setTimeout(() => {
                loadScenario(currentScenario + 1);
            }, 800);
        }
    }

    function endGame(success) {
        const stage = document.getElementById('game-stage');
        
        let endHtml = `<div class="card" style="text-align: center; padding: 3rem;">`;
        if (success) {
            endHtml += `
                <h1 style="color: var(--success); font-size: 3rem;">¡Misión Cumplida! 🎉</h1>
                <p style="font-size: 1.3rem;">Gran manejo financiero. Has logrado superar todas las trampas matemáticas manteniendo un saldo a favor de <strong>$${budget}</strong>.</p>
                <p>Las fracciones no son tus enemigas, ¡son tu herramienta para no perder dinero en la vida real!</p>
            `;
        } else {
            endHtml += `
                <h1 style="color: var(--danger); font-size: 3rem;">¡Bancarrota! 💸</h1>
                <p style="font-size: 1.3rem;">Tu presupuesto se agotó (quedaste debiendo plata). Caíste en las trampas del supermercado o calculaste mal las fracciones.</p>
                <p>¡No te rindas! Toma lápiz y papel, suma las fracciones y vuelve a intentarlo.</p>
            `;
        }
        endHtml += `
            <button class="btn-start" style="margin-top: 2rem;" onclick="resetGame()">REINTENTAR JUEGO 🔄</button>
        </div>`;
        
        stage.innerHTML = endHtml;
    }

    function resetGame() {
        budget = 30000;
        updateBudgetDisplay();
        loadScenario(0);
    }
</script>

</body>
</html>
