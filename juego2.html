<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena de Enteros - CPES N°30</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text-light: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation; /* Evita zoom al hacer doble tap rápido en celular */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%);
            position: relative;
        }

        /* --- HEADER & STATS --- */
        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 2px solid #312e81;
        }
        .btn-volver {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .level-info {
            text-align: right;
        }
        .level-text { font-size: 1.2rem; font-weight: bold; color: var(--warning); margin: 0;}
        .score-text { font-size: 0.9rem; color: #94a3b8; margin: 0;}

        /* --- BATTLE ARENA --- */
        .arena {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background-image: radial-gradient(circle at center, #312e81 0%, transparent 70%);
        }

        .fighter {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
            transition: transform 0.2s;
        }

        .sprite {
            font-size: 5rem;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            position: relative;
            z-index: 10;
        }

        .health-bar-bg {
            width: 100%;
            height: 15px;
            background-color: #334155;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 2px solid #000;
            overflow: hidden;
        }
        .health-bar-fill {
            height: 100%;
            background-color: var(--success);
            width: 100%;
            transition: width 0.3s ease, background-color 0.3s;
        }
        .enemy-health .health-bar-fill { background-color: var(--danger); }

        .name-tag { font-weight: bold; margin-bottom: 5px; font-size: 1.1rem;}

        /* Animaciones de Batalla */
        .attack-hero { animation: heroStrike 0.3s ease-in-out; }
        .attack-enemy { animation: enemyStrike 0.3s ease-in-out; }
        .hurt { animation: takeDamage 0.4s ease-in-out; filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }

        @keyframes heroStrike { 0% {transform: translateX(0) scale(1);} 50% {transform: translateX(50px) scale(1.2);} 100% {transform: translateX(0) scale(1);} }
        @keyframes enemyStrike { 0% {transform: translateX(0) scale(1);} 50% {transform: translateX(-50px) scale(1.2);} 100% {transform: translateX(0) scale(1);} }
        @keyframes takeDamage { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        /* Efectos de Daño Flotante */
        .damage-text {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #000, 0 0 10px var(--danger);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            opacity: 0;
            z-index: 20;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }

        /* --- COMBAT PANEL (PREGUNTAS) --- */
        .combat-panel {
            background-color: var(--bg-panel);
            border-top: 4px solid var(--primary);
            padding: 20px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
            z-index: 30;
        }

        .question-box {
            background-color: #0f172a;
            border: 2px solid #475569;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--warning);
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-option {
            background-color: #334155;
            color: #fff;
            border: 2px solid #475569;
            border-radius: 12px;
            padding: 20px 10px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #1e293b;
        }
        .btn-option:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #1e293b;
        }
        .btn-option.correct { background-color: var(--success); border-color: #047857; }
        .btn-option.wrong { background-color: var(--danger); border-color: #991b1b; }

        /* Pantallas Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .overlay-title { font-size: 3rem; margin-bottom: 10px; }
        .overlay-text { font-size: 1.2rem; margin-bottom: 30px; color: #cbd5e1; }
        .btn-main {
            background-color: var(--primary); color: white; border: none;
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px;
            box-shadow: 0 6px 0 #1d4ed8; cursor: pointer;
        }
        .btn-main:active { transform: translateY(6px); box-shadow: 0 0 0 #1d4ed8; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-wrapper">
    
    <div class="top-bar">
        <a href="index.html" class="btn-volver">🔙</a>
        <div class="level-info">
            <h3 class="level-text" id="ui-level">Oleada 1</h3>
            <p class="score-text">Puntos: <span id="ui-score">0</span></p>
        </div>
    </div>

    <div class="arena" id="arena">
        
        <div class="fighter" id="hero-card">
            <div class="name-tag" style="color: var(--primary);">Tu Héroe</div>
            <div class="health-bar-bg"><div class="health-bar-fill" id="hero-hp"></div></div>
            <div class="sprite" id="hero-sprite">🧙‍♂️</div>
        </div>

        <div class="fighter enemy-health" id="enemy-card">
            <div class="name-tag" style="color: var(--danger);" id="enemy-name">Limo Oscuro</div>
            <div class="health-bar-bg"><div class="health-bar-fill" id="enemy-hp"></div></div>
            <div class="sprite" id="enemy-sprite">👾</div>
        </div>

    </div>

    <div class="combat-panel">
        <div class="question-box" id="question-display">
            -5 + 3 = ?
        </div>
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 class="overlay-title" style="color: var(--primary);">Arena de Enteros</h1>
        <p class="overlay-text">Resuelve los cálculos para lanzar ataques.<br>¡Ojo con la Regla de los Signos!</p>
        <button class="btn-main" onclick="startGame()">¡A Luchar!</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1 class="overlay-title" style="color: var(--danger);">¡Derrotado! 💀</h1>
        <p class="overlay-text">El enemigo fue demasiado fuerte.<br>Oleada alcanzada: <span id="final-wave" style="color: white; font-weight:bold;">1</span></p>
        <button class="btn-main" onclick="resetGame()">Reintentar</button>
    </div>

</div>

<script>
    // --- ESTADO DEL JUEGO ---
    let level = 1;
    let score = 0;
    
    const MAX_HERO_HP = 100;
    let heroHP = MAX_HERO_HP;
    
    let maxEnemyHP = 30;
    let enemyHP = 30;
    
    let correctAnswer = 0;
    let isAnimating = false;

    // Enemigos por nivel
    const enemies = ["👾", "🦇", "🐺", "👹", "💀", "🐉", "👽", "👿"];
    const enemyNames = ["Limo", "Murciélago", "Lobo Feroz", "Ogro", "Esqueleto", "Dragón", "Alien", "Jefe Supremo"];

    // --- LÓGICA MATEMÁTICA ---
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Generador de preguntas adaptativo por nivel
    function generateQuestion() {
        let qText = "";
        let ans = 0;

        if (level <= 4) {
            // Nivel 1-4: Sumas y Restas
            let n1 = getRandomInt(-15, 15);
            let n2 = getRandomInt(-15, 15);
            let op = Math.random() > 0.5 ? '+' : '-';
            
            if (op === '+') {
                ans = n1 + n2;
                qText = `${n1} + ${n2 < 0 ? `(${n2})` : n2}`;
            } else {
                ans = n1 - n2;
                qText = `${n1} - ${n2 < 0 ? `(${n2})` : n2}`;
            }
        } 
        else if (level <= 8) {
            // Nivel 5-8: Multiplicación (Regla de signos fuerte)
            let n1 = getRandomInt(-10, 10);
            let n2 = getRandomInt(-10, 10);
            if(n1===0) n1 = 2; if(n2===0) n2 = -3; // Evitar ceros fáciles
            
            ans = n1 * n2;
            qText = `${n1} &times; ${n2 < 0 ? `(${n2})` : n2}`;
        }
        else if (level <= 12) {
            // Nivel 9-12: División Exacta
            let divisor = getRandomInt(2, 10) * (Math.random() > 0.5 ? 1 : -1);
            let result = getRandomInt(2, 10) * (Math.random() > 0.5 ? 1 : -1);
            let dividendo = divisor * result;
            
            ans = result;
            qText = `${dividendo} &divide; ${divisor < 0 ? `(${divisor})` : divisor}`;
        }
        else {
            // Nivel 13+: Modo Infinito Mixto (Combina todo)
            let ops = ['+', '-', '*', '/'];
            let op = ops[getRandomInt(0, 3)];
            
            if (op === '+') {
                let n1 = getRandomInt(-30, 30); let n2 = getRandomInt(-30, 30);
                ans = n1 + n2; qText = `${n1} + ${n2 < 0 ? `(${n2})` : n2}`;
            } else if (op === '-') {
                let n1 = getRandomInt(-30, 30); let n2 = getRandomInt(-30, 30);
                ans = n1 - n2; qText = `${n1} - ${n2 < 0 ? `(${n2})` : n2}`;
            } else if (op === '*') {
                let n1 = getRandomInt(-12, 12); let n2 = getRandomInt(-12, 12);
                ans = n1 * n2; qText = `${n1} &times; ${n2 < 0 ? `(${n2})` : n2}`;
            } else {
                let divi = getRandomInt(2, 12) * (Math.random() > 0.5 ? 1 : -1);
                let res = getRandomInt(2, 12) * (Math.random() > 0.5 ? 1 : -1);
                ans = res; qText = `${divi * res} &divide; ${divi < 0 ? `(${divi})` : divi}`;
            }
        }

        correctAnswer = ans;
        document.getElementById('question-display').innerHTML = qText;

        // Generar Opciones (trampas inteligentes con signos invertidos)
        let options = [ans];
        while (options.length < 4) {
            let trap;
            let trapType = getRandomInt(1, 3);
            if (trapType === 1) trap = ans * -1; // Trampa común: signo al revés
            else if (trapType === 2) trap = ans + getRandomInt(-5, 5);
            else trap = ans + getRandomInt(-10, 10);
            
            if (!options.includes(trap) && trap !== 0) options.push(trap);
        }

        // Mezclar
        options.sort(() => Math.random() - 0.5);

        // Renderizar botones
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => handleAttack(btn, opt);
            container.appendChild(btn);
        });
    }

    // --- LÓGICA DE BATALLA Y ANIMACIONES ---
    function handleAttack(btnElement, selectedAnswer) {
        if (isAnimating) return;
        isAnimating = true;

        const hero = document.getElementById('hero-card');
        const enemy = document.getElementById('enemy-card');
        const arena = document.getElementById('arena');

        if (selectedAnswer === correctAnswer) {
            // Acierto: Heroe ataca
            btnElement.classList.add('correct');
            hero.classList.add('attack-hero');
            
            setTimeout(() => {
                enemy.classList.add('hurt');
                showDamageText(enemy, -10); // Daño fijo por acierto
                enemyHP -= 10;
                score += 15 * level;
                updateUI();
                
                if (enemyHP <= 0) {
                    setTimeout(nextLevel, 600);
                } else {
                    setTimeout(() => { resetAnimations(); generateQuestion(); }, 500);
                }
            }, 150); // Delay sincronizado con la animación de moverse
            
        } else {
            // Error: Enemigo ataca
            btnElement.classList.add('wrong');
            
            // Resaltar el correcto
            document.querySelectorAll('.btn-option').forEach(b => {
                if(parseInt(b.innerText) === correctAnswer) b.style.border = "3px solid var(--success)";
            });

            setTimeout(() => {
                enemy.classList.add('attack-enemy');
                setTimeout(() => {
                    hero.classList.add('hurt');
                    let damage = 15 + (level * 2);
                    showDamageText(hero, -damage);
                    heroHP -= damage;
                    updateUI();
                    
                    if (heroHP <= 0) {
                        setTimeout(gameOver, 600);
                    } else {
                        setTimeout(() => { resetAnimations(); generateQuestion(); }, 800);
                    }
                }, 150);
            }, 300);
        }
    }

    function showDamageText(targetElement, amount) {
        const dmgTag = document.createElement('div');
        dmgTag.className = 'damage-text';
        dmgTag.innerText = amount;
        
        // Posicionar sobre el personaje
        const rect = targetElement.getBoundingClientRect();
        dmgTag.style.left = (rect.left + rect.width/2 - 20) + 'px';
        dmgTag.style.top = (rect.top + 20) + 'px';
        
        document.body.appendChild(dmgTag);
        setTimeout(() => dmgTag.remove(), 1000);
    }

    function resetAnimations() {
        document.getElementById('hero-card').className = 'fighter';
        document.getElementById('enemy-card').className = 'fighter enemy-health';
        isAnimating = false;
    }

    function updateUI() {
        // Barras de vida
        let heroPercent = Math.max(0, (heroHP / MAX_HERO_HP) * 100);
        let enemyPercent = Math.max(0, (enemyHP / maxEnemyHP) * 100);
        
        document.getElementById('hero-hp').style.width = heroPercent + '%';
        document.getElementById('enemy-hp').style.width = enemyPercent + '%';
        
        // Color rojo si poca vida hero
        document.getElementById('hero-hp').style.backgroundColor = heroPercent < 30 ? 'var(--danger)' : 'var(--success)';

        // Textos
        document.getElementById('ui-level').innerText = "Oleada " + level;
        document.getElementById('ui-score').innerText = score;
    }

    function nextLevel() {
        level++;
        // Subir dificultad del enemigo
        maxEnemyHP = 30 + (level * 10);
        enemyHP = maxEnemyHP;
        
        // Curar al héroe un poco como premio
        heroHP = Math.min(MAX_HERO_HP, heroHP + 20);
        
        // Cambiar sprite enemigo
        let eIndex = (level - 1) % enemies.length;
        document.getElementById('enemy-sprite').innerText = enemies[eIndex];
        document.getElementById('enemy-name').innerText = enemyNames[eIndex] + " Lv." + level;
        
        resetAnimations();
        updateUI();
        generateQuestion();
    }

    // --- CONTROL DE PANTALLAS ---
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        resetGameVars();
    }

    function gameOver() {
        document.getElementById('final-wave').innerText = level;
        document.getElementById('game-over-screen').classList.remove('hidden');
    }

    function resetGame() {
        document.getElementById('game-over-screen').classList.add('hidden');
        resetGameVars();
    }

    function resetGameVars() {
        level = 1;
        score = 0;
        heroHP = MAX_HERO_HP;
        maxEnemyHP = 30;
        enemyHP = 30;
        
        document.getElementById('enemy-sprite').innerText = enemies[0];
        document.getElementById('enemy-name').innerText = enemyNames[0] + " Lv.1";
        
        updateUI();
        resetAnimations();
        generateQuestion();
    }

</script>

</body>
</html>
