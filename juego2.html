<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosco Matemático - CPES N°30</title>
    <style>
        :root {
            --bg-shop: #E0F2FE; /* Azul clarito de pared */
            --wood-counter: #8B4513; /* Madera del mostrador */
            --wood-light: #A0522D;
            --primary: #2563EB;
            --accent: #F59E0B;
            --danger: #EF4444;
            --success: #10B981;
            --text-dark: #1F2937;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0F172A;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-shop);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Botón Volver */
        .header-bar {
            background-color: var(--primary);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .btn-volver {
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid white;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .btn-volver:hover { background-color: white; color: var(--primary); }

        .score-board { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        /* Escenario del Kiosco */
        .shop-stage {
            height: 400px;
            position: relative;
            background: linear-gradient(to bottom, #E0F2FE 0%, #BAE6FD 100%);
        }

        /* Mostrador */
        .counter {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-counter));
            border-top: 10px solid #5C2E0B;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* Cliente y Animación */
        .character-box {
            position: absolute;
            bottom: 100px; /* Parado detrás del mostrador */
            left: 50px;
            width: 180px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            transform: translateX(-300px); /* Oculto a la izquierda al inicio */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .character-box.active { transform: translateX(0); }
        .char-img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .char-emoji { font-size: 8rem; margin-bottom: -20px; }

        /* Productos sobre el mostrador */
        .product-box {
            position: absolute;
            bottom: 120px;
            left: 280px;
            width: 120px;
            height: 120px;
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(-50px);
            transition: all 0.5s ease;
        }
        .product-box.active { opacity: 1; transform: translateY(0); }
        .prod-img { max-height: 100%; max-width: 100%; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));}
        .prod-emoji { font-size: 5rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));}

        /* Globo de Texto (Diálogo) */
        .speech-bubble {
            position: absolute;
            top: 30px;
            left: 200px;
            background-color: white;
            border: 3px solid var(--text-dark);
            border-radius: 20px;
            padding: 15px 20px;
            max-width: 350px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.4s ease;
            z-index: 20;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -19px;
            left: 28px;
            border-width: 18px 18px 0 0;
            border-style: solid;
            border-color: var(--text-dark) transparent transparent transparent;
            z-index: -1;
        }
        .speech-bubble.active { opacity: 1; transform: scale(1); }

        /* Caja Registradora (Panel de Control) */
        .register-panel {
            background-color: #334155;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: white;
        }
        .register-title { margin: 0; color: var(--accent); text-align: center; font-size: 1.5rem; }
        
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1E293B;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #475569;
        }
        .input-group label { font-size: 1.2rem; font-weight: bold; width: 60%; }
        .input-group input {
            width: 35%;
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 6px;
            border: 2px solid var(--primary);
            text-align: right;
            background-color: #0F172A;
            color: var(--success);
            font-weight: bold;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); }

        .btn-vender {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #047857;
        }
        .btn-vender:hover { transform: translateY(2px); box-shadow: 0 2px 0 #047857; }
        .btn-vender:active { transform: translateY(4px); box-shadow: 0 0 0 #047857; }

        /* Feedback Flotante */
        .feedback-msg {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
            margin-top: 10px;
        }
        .correct { color: var(--success); }
        .incorrect { color: var(--danger); animation: shake 0.4s; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        /* Pantalla Final */
        #end-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 50;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <div class="header-bar">
        <a href="index.html" class="btn-volver">🔙 Salir del Turno</a>
        <div>Caja Fuerte: <span class="score-board">$<span id="score">0</span></span></div>
    </div>

    <div class="shop-stage">
        
        <div class="character-box" id="character-box">
            <img src="" alt="Cliente" class="char-img" id="char-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="char-emoji" id="char-emoji" style="display: none;">🧑</div>
        </div>

        <div class="speech-bubble" id="speech-bubble">
            </div>

        <div class="product-box" id="product-box">
            <img src="" alt="Producto" class="prod-img" id="prod-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="prod-emoji" id="prod-emoji" style="display: none;">📦</div>
        </div>

        <div class="counter"></div>
    </div>

    <div class="register-panel">
        <h3 class="register-title">🛒 Caja Registradora</h3>
        
        <div class="input-group">
            <label id="label-q1">Costo TOTAL de la compra: $</label>
            <input type="number" id="input-q1" placeholder="0">
        </div>
        
        <div class="input-group">
            <label id="label-q2">VUELTO a entregar: $</label>
            <input type="number" id="input-q2" placeholder="0">
        </div>

        <button class="btn-vender" onclick="verificarVenta()">COBRAR Y ENTREGAR VUELTO 💵</button>
        <div id="feedback" class="feedback-msg"></div>
    </div>

    <div id="end-screen">
        <h1 style="color: var(--accent); font-size: 3rem;">¡Turno Terminado! 🏪</h1>
        <h2 id="final-msg"></h2>
        <p style="font-size: 1.2rem; max-width: 500px;">Gran trabajo administrando el negocio. Has practicado sumas, restas, multiplicaciones y divisiones como un verdadero profesional.</p>
        <button class="btn-vender" style="margin-top: 20px; width: auto; padding: 15px 30px;" onclick="location.reload()">Jugar Otro Turno 🔄</button>
    </div>

</div>

<script>
    // --- BASE DE DATOS DE CLIENTES Y NIVELES ---
    const niveles = [
        {
            clienteImg: "cliente1.png", emojiFallback: "👦",
            prodImg: "producto_pan.png", prodEmoji: "🥐",
            texto: "¡Hola! Quiero llevar 4 medialunas. Cada una cuesta $300. Te pago con un billete de $2000.",
            preg1: "¿Cuál es el costo TOTAL?",
            resp1: 1200, // 4 * 300
            preg2: "¿Cuánto VUELTO le debes dar?",
            resp2: 800  // 2000 - 1200
        },
        {
            clienteImg: "cliente2.png", emojiFallback: "👩‍🦰",
            prodImg: "producto_bebida.png", prodEmoji: "🥤",
            texto: "Buenas tardes. Llevo 3 gaseosas a $1500 cada una y 1 paquete de galletitas a $2500. Te pago con $10000.",
            preg1: "¿Cuál es el TOTAL a cobrar?",
            resp1: 7000, // (3 * 1500) + 2500
            preg2: "¿Cuánto VUELTO le entregas?",
            resp2: 3000 // 10000 - 7000
        },
        {
            clienteImg: "cliente3.png", emojiFallback: "👴",
            prodImg: "producto_caja.png", prodEmoji: "📦",
            texto: "Hola chico. Llevo una caja de mercadería que cuesta $12000. La vamos a pagar entre 4 vecinos a partes iguales. Yo te pago mi parte exacta con $5000.",
            preg1: "¿Cuánto debe pagar CADA VECINO? (División)",
            resp1: 3000, // 12000 / 4
            preg2: "¿Cuánto VUELTO me das por mi parte?",
            resp2: 2000 // 5000 - 3000
        },
        {
            clienteImg: "cliente4.png", emojiFallback: "👧",
            prodImg: "producto_dulces.png", prodEmoji: "🍬",
            texto: "¡Hola! Dame 5 docenas de chupetines. Cada docena está $400. Y también un chocolate gigante de $1500. Toma, te doy $4000.",
            preg1: "¿Cuánto es el TOTAL?",
            resp1: 3500, // (5 * 400) + 1500
            preg2: "¿Cuánto VUELTO me das?",
            resp2: 500 // 4000 - 3500
        }
    ];

    let nivelActual = 0;
    let dineroCaja = 0;

    // --- LÓGICA DE ANIMACIÓN Y CARGA ---
    function cargarNivel() {
        if (nivelActual >= niveles.length) {
            finalizarJuego();
            return;
        }

        const data = niveles[nivelActual];

        // Reset inputs
        document.getElementById('input-q1').value = '';
        document.getElementById('input-q2').value = '';
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('feedback').className = 'feedback-msg';

        // Ocultar elementos para animarlos de entrada
        const charBox = document.getElementById('character-box');
        const speech = document.getElementById('speech-bubble');
        const prodBox = document.getElementById('product-box');
        
        charBox.classList.remove('active');
        speech.classList.remove('active');
        prodBox.classList.remove('active');

        // Configurar Textos de Labels
        document.getElementById('label-q1').innerText = data.preg1;
        document.getElementById('label-q2').innerText = data.preg2;

        // Configurar Imágenes y Emojis
        const charImg = document.getElementById('char-img');
        const charEmoji = document.getElementById('char-emoji');
        charImg.style.display = 'block'; charEmoji.style.display = 'none';
        charImg.src = data.clienteImg;
        charEmoji.innerText = data.emojiFallback;

        const prodImg = document.getElementById('prod-img');
        const prodEmoji = document.getElementById('prod-emoji');
        prodImg.style.display = 'block'; prodEmoji.style.display = 'none';
        prodImg.src = data.prodImg;
        prodEmoji.innerText = data.prodEmoji;

        // Animar Entrada
        setTimeout(() => {
            charBox.classList.add('active'); // Entra el cliente
            setTimeout(() => {
                speech.innerHTML = data.texto;
                speech.classList.add('active'); // Habla el cliente
                prodBox.classList.add('active'); // Deja el producto en la mesa
            }, 800);
        }, 100);
    }

    // --- LÓGICA DE VALIDACIÓN ---
    function verificarVenta() {
        const data = niveles[nivelActual];
        const in1 = parseInt(document.getElementById('input-q1').value);
        const in2 = parseInt(document.getElementById('input-q2').value);
        const feedback = document.getElementById('feedback');

        if (isNaN(in1) || isNaN(in2)) {
            feedback.innerText = "¡Atención! Debes completar ambos campos con números.";
            feedback.className = "feedback-msg incorrect";
            return;
        }

        if (in1 === data.resp1 && in2 === data.resp2) {
            // ¡Correcto!
            dineroCaja += data.resp1;
            document.getElementById('score').innerText = dineroCaja;
            
            feedback.innerHTML = "¡Excelente cálculo! ✅ +$" + data.resp1 + " a la caja.";
            feedback.className = "feedback-msg correct";

            // Siguiente cliente
            nivelActual++;
            setTimeout(cargarNivel, 2000);
        } else {
            // Incorrecto
            feedback.innerText = "¡Hay un error en las cuentas! Revisa el Total y el Vuelto.";
            feedback.className = "feedback-msg incorrect";
            
            // Vaciar para que intente de nuevo
            document.getElementById('input-q1').value = '';
            document.getElementById('input-q2').value = '';
        }
    }

    function finalizarJuego() {
        const endScreen = document.getElementById('end-screen');
        const finalMsg = document.getElementById('final-msg');
        
        finalMsg.innerHTML = `Ventas Totales del Día: <span style="color: var(--success);">$${dineroCaja}</span>`;
        endScreen.style.display = 'flex';
    }

    // Iniciar el primer cliente al cargar la página
    window.onload = cargarNivel;

</script>

</body>
</html>
